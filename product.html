<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8">

    <title>Xac Thuc San Pham</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',-apple-system,sans-serif;background:#f5f5f5;color:#424242;min-height:100vh;max-width:480px;margin:0 auto}
    .product-header{background:#2e7d32;color:#fff;padding:14px 16px;position:sticky;top:0;z-index:10}
    .header-content{display:flex;align-items:center;gap:10px;justify-content:center}
    .header-content h1{font-size:17px;font-weight:700}
    .header-icon{width:30px;height:30px;display:flex;align-items:center;justify-content:center}
    .product-main{padding:16px;min-height:calc(100vh - 120px)}
    .loading-state{text-align:center;padding:60px 20px}
    .spinner{width:40px;height:40px;border:4px solid #e0e0e0;border-top-color:#2e7d32;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-state p,.error-state p{font-size:14px;color:#757575}
    .error-state{text-align:center;padding:60px 20px;display:none}
    .error-state h2{font-size:18px;color:#212121;margin:16px 0 8px}
    .company-card{background:#fff;border-radius:12px;padding:20px;display:flex;align-items:center;gap:16px;box-shadow:0 2px 8px rgba(0,0,0,.06);border:2px solid #4caf50}
    .company-logo{width:60px;height:60px;border-radius:8px;background:#e8f5e9;display:flex;align-items:center;justify-content:center;color:#2e7d32;flex-shrink:0}
    .company-name{font-size:16px;font-weight:800;color:#1b5e20;text-transform:uppercase;line-height:1.3}
    .tabs-container{background:#fff;border-left:2px solid #4caf50;border-right:2px solid #4caf50;box-shadow:0 2px 8px rgba(0,0,0,.06)}
    .tabs{display:flex;border-bottom:1px solid #e0e0e0}
    .tab{flex:1;padding:12px 8px;background:none;border:none;font-size:13px;font-weight:600;color:#757575;cursor:pointer;text-align:center;transition:all .2s;position:relative}
    .tab.active{color:#2e7d32}
    .tab.active::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:3px;background:#2e7d32;border-radius:3px 3px 0 0}
    .tab:hover{color:#2e7d32;background:#e8f5e9}
    .product-name-card{background:#fff;border-left:2px solid #4caf50;border-right:2px solid #4caf50;padding:20px;text-align:center;border-top:1px solid #e0e0e0;box-shadow:0 2px 8px rgba(0,0,0,.06)}
    .product-name-card h2{font-size:22px;font-weight:800;color:#212121;letter-spacing:1px}
    .activation-badge{background:#e8f5e9;border:2px solid #4caf50;border-radius:8px;padding:12px 16px;display:flex;align-items:center;gap:8px;margin:16px 0;color:#2e7d32;font-size:14px;font-weight:600}
    .tab-content{display:none;animation:fadeIn .3s ease}
    .tab-content.active{display:block}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    .info-table{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06)}
    .info-row{display:flex;padding:14px 16px;border-bottom:1px solid #e0e0e0;gap:12px}
    .info-row:last-child{border-bottom:none}
    .info-label{font-size:13px;font-weight:700;color:#212121;min-width:130px;flex-shrink:0}
    .info-value{font-size:14px;color:#424242;line-height:1.5;flex:1}
    .product-footer{text-align:center;padding:20px;font-size:12px;color:#757575}
    .product-content{display:none}
    @media(max-width:360px){.info-row{flex-direction:column;gap:4px}.info-label{min-width:auto}}
    </style>
  </head>
