<!DOCTYPE html><html><body><div id="app"></div>div><script>window.onload=()=>{const p=new URLSearchParams(location.search);const d=p.get('d');if(d){try{const o=JSON.parse(decodeURIComponent(atob(d)));document.getElementById('app').innerHTML='<h1>'+o.name+'</h1><p>ID: '+o.id+'</p><p>MFG: '+o.mfg+'</p><p>EXP: '+o.exp+'</p>'}catch(e){document.getElementById('app').innerText=e}}else{document.getElementById('app').innerText='No data'}}</script></body></html></script></body></html>
